name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install librdkafka build deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p strev -p strev-channel -p strev-cloudevents -p strev-telemetry

  test-redis:
    name: Redis Integration
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p strev-redis
        env:
          REDIS_URL: redis://127.0.0.1:6379/

  test-nats:
    name: NATS Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start NATS with JetStream
        run: docker run -d --name nats -p 4222:4222 -p 8222:8222 nats:2.11-alpine --jetstream --http_port 8222
      - name: Wait for NATS
        run: |
          for i in $(seq 1 15); do
            nc -z 127.0.0.1 4222 && break || sleep 1
          done
      - run: cargo test -p strev-nats
        env:
          NATS_URL: nats://127.0.0.1:4222

  test-kafka:
    name: Kafka Integration
    runs-on: ubuntu-latest
    services:
      kafka:
        image: apache/kafka:3.8.1
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_NUM_PARTITIONS: 1
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install librdkafka build deps
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev
      - run: cargo test -p strev-kafka
        env:
          KAFKA_BROKERS: localhost:9092

  test-postgres:
    name: Postgres Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p strev-postgres
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/postgres

  test-mongodb:
    name: MongoDB Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start MongoDB replica set
        run: |
          docker run -d --name mongo -p 27017:27017 mongo:7 --replSet rs0 --bind_ip_all
          for i in $(seq 1 20); do
            docker exec mongo mongosh --quiet --eval "db.runCommand({ ping: 1 })" >/dev/null 2>&1 && break || sleep 1
          done
          docker exec mongo mongosh --quiet --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]})"
          for i in $(seq 1 20); do
            [ "$(docker exec mongo mongosh --quiet --eval 'db.hello().isWritablePrimary')" = "true" ] && break || sleep 1
          done
      - run: cargo test -p strev-mongodb
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/?directConnection=true

  commitlint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: taiki-e/install-action@v2
        with:
          tool: committed
      - name: Lint commit messages
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            committed "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --no-merge-commit -v
          else
            committed "${{ github.event.before }}..${{ github.sha }}" --no-merge-commit -v
          fi
